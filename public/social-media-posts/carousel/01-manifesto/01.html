<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Why I'm Running — Slide 1/5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --ink:#0a1326; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422; --ochre:#b58a4a; --gold:#c99a3f;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1350px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);
    background:radial-gradient(110% 70% at 50% 12%,#f7eeda,#ece1c8 55%,#dccca8)}
  .grain{position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.45}
  .frame{position:absolute;inset:60px;border:1px solid rgba(10,19,38,.16);z-index:20;pointer-events:none}
  .metac{position:absolute;left:100px;right:100px;top:100px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:34}
  .metac .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);margin-right:10px;vertical-align:1px}
  .prog{position:absolute;left:100px;right:100px;bottom:100px;display:flex;align-items:center;justify-content:space-between;z-index:34;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,237,224,.85);text-shadow:0 1px 8px rgba(8,13,28,.6)}
  .dots{display:flex;gap:9px}.dots i{width:9px;height:9px;border-radius:50%;background:rgba(243,237,224,.4)}.dots i.on{background:#e3bd6c;box-shadow:0 0 10px rgba(227,189,108,.6)}
  .swipe{display:inline-flex;align-items:center;gap:10px;color:#e3bd6c}

  .cover{position:absolute;left:100px;right:100px;top:230px;z-index:24}
  .eye{font-family:var(--mono);font-size:15px;letter-spacing:.36em;text-transform:uppercase;color:var(--signal-deep);display:flex;align-items:center;gap:16px;margin-bottom:40px}
  .eye::before{content:"";width:56px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:152px;line-height:.9;letter-spacing:-.04em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep);display:block}
  .sub{margin-top:44px;font-family:var(--display);font-style:italic;font-weight:400;font-size:40px;color:var(--ink-mute)}
  /* portrait band */
  .photo{position:absolute;left:0;right:0;bottom:0;height:560px;z-index:14;
    background:url("/randall-fryer-overlook.png") no-repeat;background-size:cover;background-position:50% 32%;filter:saturate(.92) contrast(1.03)}
  .photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#e9dfc6 0%, rgba(233,223,198,.55) 12%, transparent 34%),linear-gradient(0deg, rgba(10,19,38,.5) 0%, transparent 40%)}
  .name{position:absolute;left:100px;bottom:170px;z-index:24;color:var(--bone);text-shadow:0 2px 16px rgba(8,13,28,.6)}
  .name .n{font-family:var(--display);font-style:italic;font-weight:500;font-size:56px;letter-spacing:-.02em}
  .name .o{font-family:var(--mono);font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,237,224,.85);margin-top:6px}
</style>
</head>
<body>
  <div class="stage">
    <div class="photo" aria-hidden></div>
    <div class="grain"></div>
    <div class="frame"></div>
    <div class="metac"><span><span class="dot"></span>A Message From Randall Fryer</span><span>01 / 05</span></div>
    <div class="cover">
      <div class="eye">Oregon House · District 28</div>
      <h1>Why I'm<br><span class="it">running.</span></h1>
      <div class="sub">A message from Randall Fryer.</div>
    </div>
    <div class="name"><div class="n">Randall Fryer</div><div class="o">Republican Nominee · Oregon HD 28</div></div>
    <div class="prog"><span class="dots"><i class="on"></i><i></i><i></i><i></i><i></i></span><span class="swipe">Swipe <svg width="26" height="10" viewBox="0 0 26 10" fill="none"><path d="M0 5h23M19 1l5 4-5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></span></div>
  </div>
</body>
</html>

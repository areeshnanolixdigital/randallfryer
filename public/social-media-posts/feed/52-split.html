<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 52 — Bring The Conversation Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --ochre:#b58a4a; --sage:#4f6358;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--ink);box-shadow:0 60px 120px -40px rgba(0,0,0,.45);
    background:radial-gradient(120% 100% at 30% 0%, #f8f0da 0%, #efe3c6 52%, #e0d0ac 100%)}
  .warm{position:absolute;right:120px;top:120px;width:520px;height:520px;border-radius:50%;z-index:1;background:radial-gradient(circle,rgba(255,236,186,.7),transparent 68%);mix-blend-mode:screen}
  .stage::before{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.4}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#4b5364;z-index:34}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);vertical-align:1px;margin-right:10px}
  .head{position:absolute;left:96px;top:220px;width:560px;z-index:34}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);display:inline-flex;align-items:center;gap:14px;margin-bottom:26px}
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:78px;line-height:.96;letter-spacing:-.03em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}
  .body{position:absolute;left:96px;top:560px;width:440px;z-index:34;font-size:18px;line-height:1.6;color:rgba(10,19,38,.78)}
  .body b{color:var(--ink);font-weight:600}
  /* cozy room: chairs around a rug */
  .room{position:absolute;right:70px;bottom:150px;width:460px;height:440px;z-index:12}
  .rug{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);width:380px;height:150px;border-radius:50%;background:radial-gradient(closest-side,rgba(155,45,44,.22),rgba(155,45,44,.08) 70%,transparent);border:2px dashed rgba(122,36,34,.25)}
  .chair{position:absolute;width:78px;height:96px;border-radius:14px 14px 8px 8px;background:linear-gradient(180deg,#33463d,#25352e);box-shadow:0 16px 22px rgba(10,19,38,.2)}
  .chair::before{content:"";position:absolute;left:8px;right:8px;top:10px;height:44px;border-radius:8px;background:rgba(243,237,224,.14)}
  .chair.c1{left:40px;bottom:150px;transform:rotate(18deg)}
  .chair.c2{left:170px;bottom:120px;background:linear-gradient(180deg,#9b2d2c,#7a2422)}
  .chair.c3{right:170px;bottom:120px;background:linear-gradient(180deg,#18223b,#0f1830)}
  .chair.c4{right:40px;bottom:150px;transform:rotate(-18deg);background:linear-gradient(180deg,#b58a4a,#8a6733)}
  .table{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);width:130px;height:64px;border-radius:50%;background:linear-gradient(180deg,#d9b57f,#b98f56);box-shadow:0 18px 24px rgba(10,19,38,.2)}
  .table::after{content:"";position:absolute;left:50%;top:-18px;transform:translateX(-50%);width:26px;height:22px;border-radius:6px 6px 2px 2px;background:#4f6358}
  .foot{position:absolute;left:96px;bottom:96px;z-index:34;font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--signal-deep)}
</style>
</head>
<body>
  <div class="stage">
    <div class="warm" aria-hidden></div>
    <div class="frame"></div>
    <div class="meta"><span><span class="dot"></span>Community Event · Oregon HD28</span><span>File №52</span></div>
    <div class="head">
      <div class="eyebrow">Meet Randall</div>
      <h1>Bring the conversation to your <span class="it">community.</span></h1>
    </div>
    <div class="body"><b>Host a neighborhood coffee, small gathering, community forum, or local-business conversation.</b> Help Randall hear directly from the people of District 28.</div>
    <div class="room" aria-hidden>
      <div class="rug"></div>
      <div class="chair c1"></div><div class="chair c2"></div><div class="chair c3"></div><div class="chair c4"></div>
      <div class="table"></div>
    </div>
    <div class="foot">Request an event · #TeamFryer</div>
  </div>
</body>
</html>

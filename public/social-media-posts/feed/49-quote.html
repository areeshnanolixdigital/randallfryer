<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 49 — Italic Pull-Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:linear-gradient(180deg,#f4ebd8 0%,#e9dfc6 70%,#d8cdb1 100%)}
  .grain{content:"";position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:8}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9b2d2c;margin-right:10px;vertical-align:1px}
  .qmark{position:absolute;left:80px;top:150px;font-family:var(--display);font-style:italic;font-weight:400;font-size:520px;line-height:1;color:#9b2d2c;opacity:.16;z-index:6}
  .quote{position:absolute;left:120px;right:120px;top:340px;font-family:var(--display);font-weight:400;font-style:italic;font-size:82px;line-height:1.12;letter-spacing:-.02em;color:var(--ink);z-index:16}
  .quote b{font-style:italic;font-weight:500;color:#7a2422}
  .seal{position:absolute;right:96px;bottom:200px;width:190px;height:190px;border-radius:50%;z-index:14;background:radial-gradient(50% 50% at 36% 30%,#f7e1bd 0%,var(--ochre-soft) 30%,var(--ochre) 58%,#7a2422 100%);box-shadow:inset 0 20px 40px rgba(255,242,210,.5),inset 0 -24px 44px rgba(0,0,0,.4),0 26px 50px rgba(10,19,38,.3)}
  .seal .c{position:absolute;inset:0;display:grid;place-items:center}
  .seal .c svg{width:110px;height:110px}
  .src{position:absolute;left:120px;bottom:210px;font-family:var(--mono);font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);display:flex;align-items:center;gap:16px;z-index:16}
  .src::before{content:"";width:56px;height:1px;background:var(--ink)}
  .foot{position:absolute;left:96px;right:96px;bottom:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .foot .fdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9b2d2c;margin-right:10px;vertical-align:1px}
</style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>
<div class="frame"></div><div class="meta"><span><span class="dot"></span>Districtus XIV · Primary MMXXVI</span><span>File №49</span></div>
    <div class="qmark">&ldquo;</div>
    <p class="quote">Lorem ipsum <b>dolor sit amet,</b> consectetur adipiscing elit sed do.</p>
    <div class="src">Lorem Ipsum · Districtus XIV</div>
    <div class="seal"><div class="c"><svg viewBox="0 0 200 200" fill="none">
      <path d="M40 150 L160 150 L160 140 L40 140 Z" fill="#0a1326" opacity=".85"/>
      <path d="M50 140 L50 90 M70 140 L70 90 M90 140 L90 90 M110 140 L110 90 M130 140 L130 90 M150 140 L150 90" stroke="#0a1326" stroke-width="3" opacity=".85"/>
      <path d="M40 90 L160 90 L160 80 L40 80 Z" fill="#0a1326" opacity=".85"/>
      <path d="M100 80 Q60 80 60 50 Q60 30 100 30 Q140 30 140 50 Q140 80 100 80 Z" fill="#0a1326" opacity=".85"/>
      <circle cx="100" cy="25" r="4" fill="#0a1326" opacity=".85"/>
      <path d="M100 22 L100 8" stroke="#0a1326" stroke-width="2"/>
    </svg></div></div>
    <div class="foot"><span><span class="fdot"></span>Ratified · MMXXVI</span><span>XV / XXVI</span></div>
  </div>
</body>
</html>

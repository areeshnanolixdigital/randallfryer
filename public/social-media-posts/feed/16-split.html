<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 16 — Asymmetric Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:var(--bone)}
  .grain{content:"";position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .ink{position:absolute;inset:0;background:radial-gradient(120% 100% at 80% 100%,#16203a,#0a1326 60%,#060b18);clip-path:polygon(38% 0,100% 0,100% 100%,62% 100%);z-index:4}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:8;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9b2d2c;margin-right:10px;vertical-align:1px}
  .h{position:absolute;left:96px;top:300px;max-width:520px;font-family:var(--display);font-weight:500;font-size:118px;line-height:.92;letter-spacing:-.04em;color:var(--ink);z-index:16}
  .h .it{font-style:italic;font-weight:400;color:#7a2422}
  .p{position:absolute;left:96px;bottom:240px;max-width:420px;font-family:var(--sans);font-size:17px;line-height:1.6;color:var(--ink-mute);z-index:16}
  .cube{position:absolute;right:150px;top:50%;transform:translateY(-50%) rotate(-12deg);width:260px;height:260px;z-index:18;background:linear-gradient(135deg,#9b2d2c,#7a2422);box-shadow:0 40px 80px rgba(0,0,0,.5),inset 0 30px 40px rgba(255,255,255,.14),inset 0 -30px 50px rgba(0,0,0,.4)}
  .cube::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.35),transparent 45%)}
  .tag{position:absolute;right:120px;bottom:260px;font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,237,224,.75);z-index:18;text-align:right}
  .tag .big{font-family:var(--display);font-style:italic;font-size:64px;color:var(--bone);display:block}
  .foot{position:absolute;left:96px;right:96px;bottom:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;z-index:20}
  .foot .l{color:var(--ink-mute)} .foot .r{color:rgba(243,237,224,.7)}
  .foot .fdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9b2d2c;margin-right:10px;vertical-align:1px}
</style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>
<div class="ink"></div><div class="frame"></div><div class="meta"><span><span class="dot"></span>Districtus XIV · Primary MMXXVI</span><span>File №16</span></div>
    <h1 class="h">Ratio<br><span class="it">publica</span><br>civis.</h1>
    <p class="p">Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    <div class="cube"></div>
    <div class="tag"><span class="big">VI</span>Districtus · MMXXVI</div>
    <div class="foot"><span class="l"><span class="fdot"></span>Nota Bene · III</span><span class="r">File №16</span></div>
  </div>
</body>
</html>

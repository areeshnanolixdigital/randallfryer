<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 06 — A Physician's Discipline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --paper:#f6f1e4;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:radial-gradient(120% 100% at 20% 0%, #f8f3e6 0%, #f1ebdb 55%, #e6ddc8 100%);
    color:var(--ink);font-family:var(--sans);
    box-shadow:0 60px 120px -40px rgba(0,0,0,.45);
  }

  /* Fine medical-chart grid */
  .grid{
    position:absolute;inset:0;z-index:2;pointer-events:none;
    background-image:
      linear-gradient(rgba(122,36,34,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,36,34,.06) 1px, transparent 1px),
      linear-gradient(rgba(122,36,34,.11) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,36,34,.11) 1px, transparent 1px);
    background-size:28px 28px,28px 28px,140px 140px,140px 140px;
  }

  /* ECG / heartbeat line */
  .ecg{position:absolute;left:0;right:0;top:706px;z-index:3;pointer-events:none;opacity:.9}
  .ecg svg{width:100%;height:120px;display:block}

  /* Portrait column, right */
  .photo{
    position:absolute;right:0;top:0;width:452px;height:100%;z-index:4;
    background:url("/randall-fryer-kitchen-table.png") no-repeat;
    background-size:cover;background-position:53% 30%;
    filter:saturate(.72) contrast(1.03);
    -webkit-mask-image:linear-gradient(90deg, transparent 0%, rgba(0,0,0,.5) 12%, #000 30%);
    mask-image:linear-gradient(90deg, transparent 0%, rgba(0,0,0,.5) 12%, #000 30%);
  }
  .photo::after{
    content:"";position:absolute;inset:0;
    background:
      linear-gradient(90deg, rgba(246,241,228,.5) 0%, transparent 34%),
      linear-gradient(0deg, rgba(10,19,38,.28) 0%, transparent 42%),
      linear-gradient(200deg, rgba(212,172,110,.16), transparent 40%);
    mix-blend-mode:multiply;
  }
  .divider{position:absolute;right:452px;top:56px;bottom:56px;width:1px;background:rgba(10,19,38,.16);z-index:5}

  /* Paper grain */
  .stage::after{
    content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .05 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode:multiply;opacity:.4;
  }

  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}

  .meta{
    position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:34;
  }
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);
    box-shadow:0 0 0 4px rgba(155,45,44,.13);vertical-align:1px;margin-right:10px}
  .meta b{color:var(--signal-deep);font-weight:600}

  .block{position:absolute;left:96px;top:206px;width:520px;z-index:34}
  .eyebrow{
    font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);
    display:inline-flex;align-items:center;gap:14px;margin-bottom:28px;
  }
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}

  h1{
    font-family:var(--display);font-weight:600;
    font-size:88px;line-height:.95;letter-spacing:-.035em;color:var(--ink);
  }
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}

  /* Discipline chips with pulse markers */
  .chips{margin-top:38px;display:flex;flex-direction:column;gap:16px;max-width:440px}
  .chip{display:flex;align-items:center;gap:16px;
    font-family:var(--mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  .chip .pulse{flex:0 0 auto;width:12px;height:12px;border-radius:50%;background:var(--signal);
    box-shadow:0 0 0 5px rgba(155,45,44,.12)}
  .chip i{font-family:var(--display);font-style:italic;text-transform:none;letter-spacing:0;font-size:19px;color:var(--ink-mute);font-weight:400}

  .lede{
    position:absolute;left:96px;bottom:150px;width:560px;z-index:34;
    font-size:18px;line-height:1.62;color:rgba(10,19,38,.78);
  }
  .lede b{color:var(--ink);font-weight:600}

  .foot{
    position:absolute;left:96px;bottom:92px;z-index:34;
    font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute);
  }
  .foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);margin-right:10px;vertical-align:1px}
</style>
</head>
<body>
  <div class="stage">
    <div class="grid" aria-hidden></div>

    <div class="ecg" aria-hidden>
      <svg viewBox="0 0 1080 120" preserveAspectRatio="none" fill="none">
        <path d="M0 60 H150 l14 0 l10 -34 l14 64 l12 -30 H360 l30 0 l8 -46 l16 84 l10 -38 H720 l20 0 l10 -30 l14 58 l12 -28 H1080"
          stroke="#9b2d2c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>

    <div class="photo" aria-hidden></div>
    <div class="divider" aria-hidden></div>
    <div class="frame"></div>

    <div class="meta">
      <span><span class="dot"></span>Public Service · Oregon HD28</span>
      <span>File №<b>06</b> · Leadership</span>
    </div>

    <div class="block">
      <div class="eyebrow">A Record Of Responsibility</div>
      <h1>A physician's<br>discipline<br>for <span class="it">Salem.</span></h1>
      <div class="chips">
        <div class="chip"><span class="pulse"></span>Listen&nbsp;<i>carefully</i></div>
        <div class="chip"><span class="pulse"></span>Examine&nbsp;<i>the evidence</i></div>
        <div class="chip"><span class="pulse"></span>Take&nbsp;<i>responsibility</i></div>
      </div>
    </div>

    <div class="foot"><span class="dot"></span>Randall Fryer · Oregon House · HD 28</div>
  </div>
</body>
</html>

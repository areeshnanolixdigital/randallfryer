<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 28 — Local Schools Need Local Leadership</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --ochre:#b58a4a; --sage:#4f6358;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--ink);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);
    background:linear-gradient(180deg,#cfe0e6 0%, #e6e0cf 52%, #ded0b0 100%)}
  .sky{position:absolute;left:0;right:0;top:0;height:560px;z-index:1;background:linear-gradient(180deg,#bcd6e4 0%, #d8e0d8 70%, transparent 100%)}
  .sun{position:absolute;right:180px;top:90px;width:360px;height:360px;border-radius:50%;z-index:1;background:radial-gradient(circle,rgba(255,244,206,.85),transparent 66%);mix-blend-mode:screen}
  .stage::before{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.4}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#4b5364;z-index:34}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);vertical-align:1px;margin-right:10px}

  /* School building */
  .school{position:absolute;left:50%;bottom:150px;transform:translateX(-50%);width:640px;z-index:12;filter:drop-shadow(0 30px 40px rgba(10,19,38,.22))}
  .roofline{height:60px;background:#7a2422;clip-path:polygon(0 100%, 8% 0, 92% 0, 100% 100%);margin:0 40px}
  .bell{position:absolute;left:50%;top:-46px;transform:translateX(-50%);width:54px;height:70px;background:#8a3230;border-radius:8px 8px 0 0;z-index:2}
  .bell::after{content:"";position:absolute;left:50%;top:14px;transform:translateX(-50%);width:26px;height:34px;border-radius:50%;background:var(--gold)}
  .flag{position:absolute;left:50%;top:-118px;transform:translateX(-50%);width:3px;height:76px;background:#5a4221;z-index:2}
  .flag::after{content:"";position:absolute;left:3px;top:0;width:44px;height:28px;background:var(--signal)}
  .bldg{background:linear-gradient(180deg,#c66b4f,#a9503a);height:280px;border-radius:6px;position:relative;border:1px solid rgba(10,19,38,.15)}
  .steps{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:220px;height:26px;background:#d8cdb1;border-radius:4px;box-shadow:0 12px 0 -2px #c3b494}
  .door{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:96px;height:150px;border-radius:48px 48px 0 0;background:linear-gradient(180deg,#33463d,#25352e);box-shadow:0 0 0 6px rgba(243,237,224,.55)}
  .win{position:absolute;top:60px;width:70px;height:90px;border-radius:6px;background:linear-gradient(160deg,#cfe0dd,#9db8b3);box-shadow:inset 0 0 14px rgba(10,19,38,.25),0 0 0 5px rgba(243,237,224,.6)}
  .wl{left:70px}.wr{right:70px}
  .name{position:absolute;left:0;right:0;top:20px;text-align:center;font-family:var(--mono);font-size:13px;letter-spacing:.3em;color:rgba(243,237,224,.92)}

  .head{position:absolute;left:96px;top:210px;width:560px;z-index:34}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);display:inline-flex;align-items:center;gap:14px;margin-bottom:22px}
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:74px;line-height:.96;letter-spacing:-.03em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}
  /* Oregon HD28 marker */
  .marker{position:absolute;left:96px;bottom:200px;z-index:34;display:inline-flex;align-items:center;gap:12px;background:#0a1326;color:var(--bone);padding:12px 20px;border-radius:30px;font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;box-shadow:0 16px 26px rgba(10,19,38,.25)}
  .marker .om{width:26px;height:20px;background:var(--gold);-webkit-mask:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 76' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2,15 L22,11 L31,15 L47,12 L59,16 L73,11 L98,19 L92,31 L86,45 L82,53 L85,61 L80,73 L2,67 Z'/%3E%3C/svg%3E") center/contain no-repeat;mask:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 76' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2,15 L22,11 L31,15 L47,12 L59,16 L73,11 L98,19 L92,31 L86,45 L82,53 L85,61 L80,73 L2,67 Z'/%3E%3C/svg%3E") center/contain no-repeat}
  .foot{position:absolute;left:96px;bottom:96px;z-index:34;font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--signal-deep)}
</style>
</head>
<body>
  <div class="stage">
    <div class="sky" aria-hidden></div>
    <div class="sun" aria-hidden></div>
    <div class="frame"></div>
    <div class="meta"><span><span class="dot"></span>Local Control · Oregon Education</span><span>File №28</span></div>

    <div class="school" aria-hidden>
      <div class="flag"></div>
      <div class="bell"></div>
      <div class="roofline"></div>
      <div class="bldg">
        <div class="name">DISTRICT 28 SCHOOL</div>
        <div class="win wl"></div><div class="win wr"></div>
        <div class="door"></div>
        <div class="steps"></div>
      </div>
    </div>

    <div class="head">
      <div class="eyebrow">Local Control · School Boards</div>
      <h1>Local schools need local <span class="it">leadership.</span></h1>
    </div>
    <div class="marker"><span class="om"></span>Oregon · District 28</div>
    <div class="foot">Return decisions closer to home</div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 12 — Teach The Past, Prepare For The Future</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--ink);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);
    background:radial-gradient(120% 100% at 30% 0%, #efe6d0 0%, #e4d7ba 55%, #d3c39f 100%)}
  .stage::before{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#4b5364;z-index:34}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);vertical-align:1px;margin-right:10px}

  .head{position:absolute;left:96px;top:200px;width:600px;z-index:34}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);display:inline-flex;align-items:center;gap:14px;margin-bottom:24px}
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:74px;line-height:.98;letter-spacing:-.03em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}

  /* Flat-lay desk still life */
  .flat{position:absolute;right:70px;bottom:150px;width:640px;height:560px;z-index:20}
  .item{position:absolute;box-shadow:0 24px 40px rgba(10,19,38,.22)}
  /* history book */
  .book{right:40px;bottom:40px;width:360px;height:250px;border-radius:8px;transform:rotate(-6deg);
    background:linear-gradient(150deg,#7a2422,#5a1a19);border-left:16px solid #4a1413}
  .book .t{position:absolute;left:44px;top:40px;font-family:var(--display);font-weight:600;font-size:34px;color:rgba(243,237,224,.92)}
  .book .s{position:absolute;left:44px;top:92px;font-family:var(--mono);font-size:12px;letter-spacing:.3em;color:rgba(243,237,224,.6)}
  .book .seal{position:absolute;right:34px;bottom:30px;width:70px;height:70px;border-radius:50%;border:2px solid rgba(227,189,108,.7);background:radial-gradient(circle at 40% 35%, rgba(227,189,108,.5), rgba(122,36,34,.2))}
  /* notebook */
  .note{left:20px;bottom:90px;width:290px;height:360px;border-radius:8px;transform:rotate(5deg);background:#faf5e8;border:1px solid rgba(10,19,38,.12)}
  .note .lines{position:absolute;left:30px;right:26px;top:44px;height:2px;background:rgba(10,19,38,.16);box-shadow:0 34px 0 rgba(10,19,38,.12),0 68px 0 rgba(10,19,38,.12),0 102px 0 rgba(10,19,38,.12),0 136px 0 rgba(10,19,38,.12),0 170px 0 rgba(10,19,38,.12),0 204px 0 rgba(10,19,38,.12)}
  .note .marg{position:absolute;left:74px;top:20px;bottom:20px;width:2px;background:rgba(155,45,44,.5)}
  /* pencil */
  .pencil{left:150px;bottom:44px;width:280px;height:20px;border-radius:4px;transform:rotate(-18deg);background:linear-gradient(90deg,#e3bd6c 0%, #d4ac6e 78%, #f3ede0 78%, #f3ede0 90%, #9b2d2c 90%);box-shadow:0 12px 20px rgba(10,19,38,.25)}
  /* Oregon map card */
  .map{right:150px;top:0;width:320px;height:230px;border-radius:8px;transform:rotate(4deg);background:#fbf6ea;border:1px solid rgba(10,19,38,.12);overflow:hidden}
  .map .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(79,99,88,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(79,99,88,.12) 1px,transparent 1px);background-size:30px 30px}
  .map svg{position:absolute;left:40px;top:40px;width:220px;fill:#4f6358;opacity:.85}
  .map .pin{position:absolute;right:70px;bottom:64px;width:14px;height:14px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 5px rgba(155,45,44,.2)}
  .map .lbl{position:absolute;left:20px;bottom:14px;font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#4f6358}

  .foot{position:absolute;left:96px;bottom:96px;z-index:34;font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--signal-deep)}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
  <div class="stage">
    <div class="frame"></div>
    <div class="meta"><span><span class="dot"></span>Oregon Education · Civics</span><span>File №12</span></div>

    <div class="head">
      <div class="eyebrow">Teach Civics · Teach History</div>
      <h1>Teach the past.<br>Prepare students<br>for <span class="it">the future.</span></h1>
    </div>

    <div class="flat" aria-hidden>
      <div class="item map">
        <div class="grid"></div>
        <svg viewBox="0 0 100 76"><path d="M2,15 L22,11 L31,15 L47,12 L59,16 L73,11 L98,19 L92,31 L86,45 L82,53 L85,61 L80,73 L2,67 Z"/></svg>
        <div class="pin"></div><div class="lbl">Oregon · HD 28</div>
      </div>
      <div class="item note"><div class="marg"></div><div class="lines"></div></div>
      <div class="item book"><div class="t">History</div><div class="s">& Civics</div><div class="seal"></div></div>
      <div class="item pencil"></div>
    </div>

    <div class="foot">Support a <b>complete education</b></div>
  </div>
</body>
</html>

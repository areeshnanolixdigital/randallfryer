<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 11 — Restore Educational Excellence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);
    background:linear-gradient(180deg,#fbf3df 0%, #f4ead0 55%, #eaddbe 100%)}
  /* Documentary photo — Randall in an Oregon classroom */
  .photo{position:absolute;inset:0;z-index:1;
    background:url("/randall-fryer-education.png") no-repeat;
    background-size:cover;background-position:60% 30%;
    filter:saturate(.94) contrast(1.03)}
  /* grain */
  .stage::after{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .05 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.4}

  /* Navy 1/3 panel (left) */
  .panel{position:absolute;left:0;top:0;width:390px;height:100%;z-index:20;
    background:linear-gradient(180deg,#101c38,#0a1326 70%,#070e1f);box-shadow:30px 0 60px rgba(10,19,38,.4);
    padding:96px 56px;display:flex;flex-direction:column;justify-content:space-between;color:var(--bone)}
  .panel .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px}
  .panel .eyebrow::before{content:"";width:34px;height:1px;background:var(--gold)}
  .panel h1{font-family:var(--display);font-weight:600;font-size:76px;line-height:.95;letter-spacing:-.035em;color:var(--bone);margin-top:26px}
  .panel h1 .it{font-style:italic;font-weight:500;color:var(--gold)}
  .panel .cta{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:rgba(243,237,224,.8)}
  .panel .cta b{color:var(--gold);font-weight:500}
  .panel .mid{margin-top:34px;font-size:16px;line-height:1.6;color:rgba(243,237,224,.8);max-width:280px}
</style>
</head>
<body>
  <div class="stage">
    <div class="photo" aria-hidden></div>

    <div class="panel">
      <div>
        <div class="eyebrow">Oregon Education</div>
        <h1>Restore educational <span class="it">excellence.</span></h1>
      </div>
    </div>
  </div>
</body>
</html>

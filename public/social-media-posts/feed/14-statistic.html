<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 14 — Keep Oregon Jobs In Oregon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--ink);box-shadow:0 60px 120px -40px rgba(0,0,0,.5);
    background:radial-gradient(120% 100% at 30% 0%, #f7eed6 0%, #ecdfc2 55%, #dccca6 100%)}
  .stage::before{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .05 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.45}
  /* Oregon outline behind headline */
  .oregon{position:absolute;left:80px;top:250px;width:620px;z-index:2;opacity:.1}
  .oregon svg{width:100%;fill:var(--signal-deep)}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#4b5364;z-index:34}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);vertical-align:1px;margin-right:10px}

  .head{position:absolute;left:96px;top:280px;width:640px;z-index:34}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);display:inline-flex;align-items:center;gap:14px;margin-bottom:26px}
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:112px;line-height:.9;letter-spacing:-.04em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}

  .body{position:absolute;left:96px;top:640px;width:440px;z-index:34;font-size:18px;line-height:1.6;color:rgba(10,19,38,.78)}
  .body b{color:var(--ink);font-weight:600}

  /* CSS storefront */
  .shop{position:absolute;right:110px;bottom:150px;width:420px;z-index:20;filter:drop-shadow(0 30px 40px rgba(10,19,38,.2))}
  .awning{height:70px;border-radius:10px 10px 4px 4px;background:repeating-linear-gradient(90deg,#9b2d2c 0 42px,#f3ede0 42px 84px);box-shadow:inset 0 -10px 20px rgba(0,0,0,.2)}
  .awning::after{content:"";position:absolute;left:0;right:0;top:70px;height:16px;background:linear-gradient(90deg,#7a2422,#5a1a19);clip-path:polygon(0 0,100% 0,96% 100%,4% 100%)}
  .facade{margin-top:16px;height:250px;border-radius:8px;background:linear-gradient(180deg,#efe4cc,#dccca8);border:1px solid rgba(10,19,38,.18);position:relative;box-shadow:inset 0 0 40px rgba(10,19,38,.08)}
  .window{position:absolute;top:34px;bottom:70px;border-radius:6px;background:linear-gradient(160deg,#bcd0cf,#8fb0ad);box-shadow:inset 0 0 24px rgba(10,19,38,.25),0 0 0 6px rgba(243,237,224,.7)}
  .win-l{left:26px;width:150px}.win-r{right:26px;width:150px}
  .door{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:78px;top:44px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#4f6358,#33463d);box-shadow:0 0 0 5px rgba(243,237,224,.6)}
  .open{position:absolute;left:50%;top:70px;transform:translateX(-50%);font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--gold);background:#0a1326;padding:4px 10px;border-radius:3px}
  .sign{position:absolute;left:50%;top:-2px;transform:translateX(-50%);font-family:var(--display);font-style:italic;font-weight:600;font-size:22px;color:#f3ede0;z-index:2}

  .foot{position:absolute;left:96px;bottom:96px;z-index:34;font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--signal-deep)}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
  <div class="stage">
    <div class="oregon" aria-hidden><svg viewBox="0 0 100 76"><path d="M2,15 L22,11 L31,15 L47,12 L59,16 L73,11 L98,19 L92,31 L86,45 L82,53 L85,61 L80,73 L2,67 Z"/></svg></div>
    <div class="frame"></div>
    <div class="meta"><span><span class="dot"></span>Oregon Jobs · Local Economy</span><span>File №14</span></div>

    <div class="head">
      <div class="eyebrow">Oregon Economy</div>
      <h1>Keep Oregon jobs <span class="it">in Oregon.</span></h1>
    </div>
    <div class="body"><b>Employers should not have to leave the state to find reasonable costs and predictable rules.</b> Randall wants Oregon businesses to stay, expand, and hire locally.</div>

    <div class="shop" aria-hidden>
      <div class="awning"></div>
      <div class="sign">Main St.</div>
      <div class="facade">
        <div class="window win-l"></div>
        <div class="window win-r"></div>
        <div class="door"></div>
        <div class="open">OPEN</div>
      </div>
    </div>

    <div class="foot">Support a <b>stronger business climate</b></div>
  </div>
</body>
</html>

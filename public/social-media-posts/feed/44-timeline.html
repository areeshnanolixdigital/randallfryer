<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 44 — Oregon Has Everything It Needs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --ink:#0a1326; --signal:#9b2d2c; --signal-deep:#7a2422; --gold:#e3bd6c; --sage:#4f6358;
    --display:'Fraunces','Times New Roman',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--bone);box-shadow:0 60px 120px -40px rgba(0,0,0,.55);
    background:linear-gradient(180deg,#bcd6e6 0%, #d9e2d4 40%, #e9dcc0 70%, #dfcfa8 100%)}
  .sun{position:absolute;right:180px;top:120px;width:300px;height:300px;border-radius:50%;z-index:1;background:radial-gradient(circle,rgba(255,246,214,.95),rgba(255,232,180,.4) 40%,transparent 70%)}
  .stage::before{content:"";position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.35}
  /* Oregon landscape with small town */
  .land{position:absolute;left:0;right:0;bottom:0;z-index:4}
  .land svg{width:100%;display:block}
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.16);z-index:30;pointer-events:none}
  .meta{position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#3f4a5c;z-index:34}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);vertical-align:1px;margin-right:10px}
  .head{position:absolute;left:96px;top:230px;width:600px;z-index:34;text-shadow:0 2px 16px rgba(243,237,224,.5)}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--signal-deep);display:inline-flex;align-items:center;gap:14px;margin-bottom:26px}
  .eyebrow::before{content:"";display:block;width:44px;height:1px;background:var(--signal-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:82px;line-height:.96;letter-spacing:-.035em;color:var(--ink)}
  h1 .it{font-style:italic;font-weight:500;color:var(--signal-deep)}
  .body{position:absolute;left:96px;top:560px;width:440px;z-index:34;font-size:18px;line-height:1.6;color:rgba(10,19,38,.8)}
  .body b{color:var(--ink);font-weight:600}
  .foot{position:absolute;left:96px;bottom:96px;z-index:34;font-family:var(--mono);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(243,237,224,.95);text-shadow:0 2px 10px rgba(10,19,38,.6)}
</style>
</head>
<body>
  <div class="stage">
    <div class="sun" aria-hidden></div>
    <div class="land" aria-hidden>
      <svg viewBox="0 0 1080 440" preserveAspectRatio="none">
        <path d="M0 170 L180 90 L360 160 L520 70 L700 150 L900 90 L1080 150 L1080 440 L0 440 Z" fill="#7f97a0" opacity=".5"/>
        <path d="M0 240 L220 180 L430 240 L640 175 L860 245 L1080 200 L1080 440 L0 440 Z" fill="#5f7a70" opacity=".7"/>
        <path d="M0 300 L1080 300 L1080 440 L0 440 Z" fill="#4f6647"/>
        <!-- small town -->
        <g fill="#33463d">
          <rect x="430" y="250" width="46" height="52"/><path d="M424 250 l29 -22 l29 22 Z"/>
          <rect x="492" y="238" width="40" height="64"/><path d="M486 238 l26 -20 l26 20 Z"/>
          <rect x="548" y="256" width="44" height="46"/><path d="M542 256 l28 -20 l28 20 Z"/>
          <rect x="512" y="196" width="6" height="46"/>
        </g>
        <rect x="510" y="196" width="20" height="14" fill="#9b2d2c"/>
        <g fill="#e3bd6c" opacity=".9"><rect x="440" y="266" width="12" height="14"/><rect x="502" y="256" width="12" height="14"/><rect x="560" y="270" width="12" height="12"/></g>
        <path d="M0 330 Q540 300 1080 332" stroke="#e3d3ad" stroke-width="20" fill="none" opacity=".6"/>
      </svg>
    </div>
    <div class="frame"></div>
    <div class="meta"><span><span class="dot"></span>Stronger Oregon · District 28</span><span>File №44</span></div>
    <div class="head">
      <div class="eyebrow">Together For Oregon</div>
      <h1>Oregon has everything it needs to <span class="it">succeed.</span></h1>
    </div>
    <div class="body"><b>Great communities, hard-working families, dedicated teachers, and innovative businesses.</b> What we need now is leadership that helps all of them succeed together.</div>
    <div class="foot">Let's build a stronger Oregon</div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 16 — Date Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:radial-gradient(90% 60% at 50% 15%,#f8efd6,#ebe2cd 55%,#d5c9ab)}
  .grain{position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .frame{position:absolute;inset:80px;border:1px solid rgba(10,19,38,.16);z-index:10}
  .meta{position:absolute;left:120px;right:120px;top:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:14px;letter-spacing:.34em;text-transform:uppercase;z-index:20}
  .meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#9b2d2c;margin-right:12px;vertical-align:1px}
  .eye{position:absolute;left:120px;right:120px;top:300px;text-align:center;font-family:var(--mono);font-size:15px;letter-spacing:.4em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .date{position:absolute;left:0;right:0;top:430px;text-align:center;font-family:var(--display);font-weight:500;font-size:190px;line-height:.85;letter-spacing:-.05em;color:var(--ink);z-index:20;text-shadow:0 3px 0 rgba(10,19,38,.9),0 8px 0 #7a2422,0 12px 0 #9b2d2c,0 20px 40px rgba(10,19,38,.4)}
  .month{position:absolute;left:0;right:0;top:800px;text-align:center;font-family:var(--display);font-style:italic;font-size:80px;color:#7a2422;z-index:20}
  .chips{position:absolute;left:120px;right:120px;top:980px;display:flex;justify-content:center;gap:30px;z-index:20}
  .chip{width:240px;padding:30px 0;text-align:center;background:rgba(10,19,38,.06);border:1px solid rgba(10,19,38,.2)}
  .chip .cv{font-family:var(--display);font-weight:500;font-size:58px;line-height:1;color:var(--ink);display:block}
  .chip .ck{font-family:var(--mono);font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute)}
  .seal{position:absolute;left:50%;bottom:250px;transform:translateX(-50%);width:170px;height:170px;border-radius:50%;background:radial-gradient(50% 50% at 36% 30%,#f7e1bd,var(--ochre-soft) 35%,var(--ochre) 65%,#7a2422);box-shadow:0 24px 44px rgba(10,19,38,.3);display:grid;place-items:center;z-index:20}
  .seal svg{width:100px;height:100px}
  .foot{position:absolute;left:120px;right:120px;bottom:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.34em;text-transform:uppercase;z-index:24}
</style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>
<div class="frame"></div><div class="meta" style="color:var(--ink-mute)"><span><span class="dot"></span>Oregon House District 28 · 2026</span><span>Story №16</span></div>
    <div class="eye">Today's Goal · Team Fryer</div>
    <div class="date">Today's</div>
    <div class="month">goal.</div>
    <div class="chips"><div class="chip"><span class="cv">Meet</span><span class="ck">New people</span></div><div class="chip"><span class="cv">Listen</span><span class="ck">Carefully</span></div><div class="chip"><span class="cv">Learn</span><span class="ck">Something new</span></div></div>
    <div class="seal"><svg viewBox="0 0 200 200" fill="none">
      <path d="M40 150 L160 150 L160 140 L40 140 Z" fill="#2a1e0c" opacity=".9"/>
      <path d="M50 140 L50 90 M70 140 L70 90 M90 140 L90 90 M110 140 L110 90 M130 140 L130 90 M150 140 L150 90" stroke="#2a1e0c" stroke-width="3" opacity=".9"/>
      <path d="M40 90 L160 90 L160 80 L40 80 Z" fill="#2a1e0c" opacity=".9"/>
      <path d="M100 80 Q60 80 60 50 Q60 30 100 30 Q140 30 140 50 Q140 80 100 80 Z" fill="#2a1e0c" opacity=".9"/>
      <circle cx="100" cy="25" r="4" fill="#2a1e0c" opacity=".9"/>
      <path d="M100 22 L100 8" stroke="#2a1e0c" stroke-width="2"/>
    </svg></div>
    <div class="foot" style="color:var(--ink-mute)"><span>Team Fryer</span><span>Story 16</span></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 17 — Marquee Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:linear-gradient(180deg,#f4ebd8,#e3d8bd);color:var(--ink)}
  .grain{position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .frame{position:absolute;inset:80px;border:1px solid rgba(10,19,38,.16);z-index:10}
  .meta{position:absolute;left:120px;right:120px;top:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:14px;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#9b2d2c;margin-right:12px;vertical-align:1px}
  .stack{position:absolute;left:120px;right:120px;top:340px;bottom:220px;display:flex;flex-direction:column;justify-content:space-between;z-index:20}
  .bar{font-family:var(--display);font-weight:500;line-height:.9;letter-spacing:-.04em;color:var(--ink);border-bottom:1px solid rgba(10,19,38,.16);padding-bottom:20px}
  .foot{position:absolute;left:120px;right:120px;bottom:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-mute);z-index:24}
</style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>
<div class="frame"></div><div class="meta" style="color:var(--ink-mute)"><span><span class="dot"></span>Oregon House District 28 · 2026</span><span>Story №17</span></div>
    <div class="stack"><div class="bar" style="font-size:128px;">District 28</div><div class="bar" style="font-size:96px;font-style:italic;color:#7a2422">deserves</div><div class="bar" style="font-size:132px;">leadership</div><div class="bar" style="font-size:100px;font-style:italic;color:#7a2422">that listens.</div><div class="bar" style="font-size:96px;line-height:.95;">That's why<br>we're here.</div></div>
    <div class="foot" style="color:var(--ink-mute)"><span>Randall Fryer · Team Fryer</span><span>Story 17</span></div>
  </div>
</body>
</html>

<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:linear-gradient(180deg,#efe6d0,#e2d6ba);color:var(--ink)}
  .grain{position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .paper{position:absolute;inset:120px;background:linear-gradient(180deg,#f6efdd,#eee3c9);border:1px solid rgba(10,19,38,.2);box-shadow:0 40px 80px rgba(10,19,38,.18),inset 0 0 60px rgba(181,138,74,.12);z-index:8}
  .meta{position:absolute;left:180px;right:180px;top:180px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);z-index:20}
  .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9b2d2c;margin-right:10px;vertical-align:1px}
  .h{position:absolute;left:180px;right:180px;top:270px;font-family:var(--display);font-weight:500;font-size:96px;line-height:.95;letter-spacing:-.03em;color:var(--ink);z-index:20}
  .h .it{font-style:italic;font-weight:400;color:#7a2422}
  .rows{position:absolute;left:180px;right:180px;top:520px;bottom:420px;display:flex;flex-direction:column;justify-content:space-between;z-index:20}
  .lr{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed rgba(10,19,38,.3);padding-bottom:16px;font-family:var(--sans);font-size:22px;color:var(--ink-mute)}
  .lr .v{font-family:var(--display);font-weight:500;font-size:40px;color:var(--ink)}
  .wax{position:absolute;right:210px;bottom:230px;width:150px;height:150px;border-radius:50%;background:radial-gradient(50% 50% at 38% 32%,#c1413f,#9b2d2c 45%,#7a2422);box-shadow:0 16px 34px rgba(122,36,34,.4),inset 0 -14px 26px rgba(0,0,0,.35);display:grid;place-items:center;z-index:22;transform:rotate(-6deg)}
  .wax svg{width:88px;height:88px}
  .sign{position:absolute;left:180px;bottom:240px;font-family:var(--display);font-style:italic;font-size:52px;color:var(--ink);z-index:20}
  .foot{position:absolute;left:180px;right:180px;bottom:170px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);z-index:22}
</style>
</head>
<body>

<div class="paper"></div><div class="meta" style="color:var(--ink-mute)"><span><span class="dot"></span>Oregon House District 28 · 2026</span><span>Story №26</span></div>

    <div class="foot"><span>Oregon House District 28 · 2026</span><span>Story №26</span></div>
  </div>
</body>
</html>

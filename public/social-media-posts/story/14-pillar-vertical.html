<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 14 — Pillar — IV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-soft:#18223b; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--ink);font-family:var(--sans);box-shadow:0 60px 120px -40px rgba(0,0,0,.5)}
.stage{background:radial-gradient(80% 50% at 50% 20%,#f8efd6,#ebe2cd 55%,#d5c9ab)}
  .grain{position:absolute;inset:0;z-index:60;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");mix-blend-mode:multiply;opacity:.5}
  .num{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);font-family:var(--display);font-style:italic;font-weight:400;font-size:1100px;line-height:.72;letter-spacing:-.06em;color:#9b2d2c;opacity:.16;z-index:4}
  .frame{position:absolute;inset:80px;border:1px solid rgba(10,19,38,.16);z-index:10}
  .meta{position:absolute;left:120px;right:120px;top:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:14px;letter-spacing:.34em;text-transform:uppercase;z-index:20}
  .meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#9b2d2c;margin-right:12px;vertical-align:1px}
  .eye{position:absolute;left:120px;top:260px;font-family:var(--mono);font-size:14px;letter-spacing:.36em;text-transform:uppercase;color:var(--ink-mute);display:flex;align-items:center;gap:18px;z-index:20}
  .eye::before{content:"";width:60px;height:1px;background:var(--ink)}
  .h{position:absolute;left:120px;right:120px;top:340px;font-family:var(--display);font-weight:500;font-size:118px;line-height:.9;letter-spacing:-.04em;color:var(--ink);z-index:20}
  .h .it{font-style:italic;font-weight:400;color:#7a2422;display:block}
  .card{position:absolute;left:120px;right:120px;bottom:220px;padding:48px;background:rgba(243,237,224,.55);border:1px solid rgba(10,19,38,.18);backdrop-filter:blur(6px);box-shadow:0 30px 60px rgba(10,19,38,.2);z-index:20}
  .card p{font-family:var(--display);font-style:italic;font-size:34px;line-height:1.3;color:var(--ink)}
  .card .src{margin-top:22px;font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute)}
  .foot{position:absolute;left:120px;right:120px;bottom:130px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.34em;text-transform:uppercase;z-index:24}
</style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>
<div class="num">28</div><div class="frame"></div><div class="meta" style="color:var(--ink-mute)"><span><span class="dot"></span>Oregon House District 28 · 2026</span><span>Story №14</span></div>
    <div class="eye">Team Fryer · Story 14</div>
    <h1 class="h">Responsible<span class="it">spending.</span></h1>
    <div class="card"><p>Responsible spending matters. Every tax dollar should work hard.</p><div class="src">Randall Fryer · Oregon House District 28</div></div>
    <div class="foot" style="color:var(--ink-mute)"><span>Team Fryer</span><span>Story 14</span></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 01 — Manifesto Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;
    background:radial-gradient(80% 60% at 50% 30%, #f8efd6 0%, #ebe2cd 50%, #d8cdb1 100%);
    color:var(--ink);font-family:var(--sans);
    box-shadow:0 60px 120px -40px rgba(0,0,0,.55);
  }
  .stage::before{
    content:"";position:absolute;inset:0;z-index:60;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode:multiply;opacity:.55;
  }
  .stage::after{
    content:"";position:absolute;inset:0;z-index:55;pointer-events:none;
    background:
      radial-gradient(60% 30% at 50% 5%, rgba(255,232,180,.4), transparent 60%),
      radial-gradient(80% 40% at 50% 100%, rgba(10,19,38,.4), transparent 60%);
  }

  /* Vertical hairline column */
  .col{position:absolute;left:96px;right:96px;top:96px;bottom:96px;border-left:1px solid rgba(10,19,38,.2);border-right:1px solid rgba(10,19,38,.2);z-index:8;pointer-events:none}
  .col::before,.col::after{content:"";position:absolute;left:0;right:0;height:1px;background:rgba(10,19,38,.2)}
  .col::before{top:0}.col::after{bottom:0}

  /* Spine numerals — placed in left gutter, never crossing the headline */
  .spine{
    position:absolute;left:50px;top:50%;transform:translate(-50%,-50%) rotate(-90deg);
    font-family:var(--mono);font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:var(--ink-mute);
    white-space:nowrap;z-index:10;opacity:.7;
  }

  /* Meta */
  .meta{
    position:absolute;left:140px;right:140px;top:140px;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:14px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);z-index:20;
  }
  .meta .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 5px rgba(155,45,44,.12);margin-right:12px;vertical-align:1px}

  /* Massive vertical headline — fits within safe zone above seal */
  .head{
    position:absolute;left:140px;right:140px;top:280px;z-index:18;
  }
  .eye{
    font-family:var(--mono);font-size:14px;letter-spacing:.36em;text-transform:uppercase;color:var(--ink-mute);
    display:flex;align-items:center;gap:18px;margin-bottom:32px;
  }
  .eye::before{content:"";width:60px;height:1px;background:var(--ink)}
  h1{
    font-family:var(--display);font-weight:500;
    font-size:200px;line-height:.92;letter-spacing:-.04em;color:var(--ink);
  }
  h1 .it{font-style:italic;color:var(--signal-deep);font-weight:400;display:block}
  h1 .sm{display:block;font-style:italic;font-weight:400;font-size:.18em;color:var(--ink-mute);margin-top:36px;letter-spacing:-.005em;line-height:1.3}

  /* Layered seal — between headline and quote, smaller for clearance */
  .seal{
    position:absolute;left:50%;top:1200px;transform:translateX(-50%);
    width:360px;height:360px;border-radius:50%;z-index:14;
    background:
      radial-gradient(50% 50% at 35% 30%, #f7e1bd 0%, var(--ochre-soft) 30%, var(--ochre) 55%, #5a4221 100%);
    box-shadow:
      inset 0 50px 80px rgba(255,242,210,.55),
      inset 0 -40px 80px rgba(0,0,0,.5),
      0 60px 80px rgba(10,19,38,.35);
  }
  .seal::before{content:"";position:absolute;inset:22px;border-radius:50%;border:1px solid rgba(10,19,38,.4)}
  .seal::after{content:"";position:absolute;inset:42px;border-radius:50%;border:1px dashed rgba(10,19,38,.3)}
  .seal .crest{position:absolute;inset:0;display:grid;place-items:center}
  .seal .crest svg{width:200px;height:200px;filter:drop-shadow(0 3px 0 rgba(255,232,180,.55))}

  /* Bottom block — sits well below seal */
  .bot{
    position:absolute;left:140px;right:140px;bottom:230px;z-index:18;
  }
  .bot p{
    font-family:var(--display);font-style:italic;font-weight:400;font-size:34px;line-height:1.3;color:var(--ink);max-width:720px;
  }
  .bot p span{color:var(--signal-deep)}
  .bot .src{margin-top:28px;font-family:var(--mono);font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);display:flex;align-items:center;gap:18px}
  .bot .src::before{content:"";width:60px;height:1px;background:var(--ink)}

  .foot{
    position:absolute;left:140px;right:140px;bottom:130px;display:flex;justify-content:space-between;z-index:20;
    font-family:var(--mono);font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);
  }

  /* Decorative ochre bars on side */
  .side{
    position:absolute;left:96px;top:300px;bottom:300px;width:6px;z-index:14;
    background:linear-gradient(180deg,var(--ochre) 0%, var(--signal) 100%);
    box-shadow:0 0 30px rgba(155,45,44,.4);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="col"></div>
    <div class="side"></div>
    <span class="spine">Capitulum · I — Sigillum · Lorem · Ipsum</span>

    <div class="meta">
      <span><span class="dot"></span>Districtus XIV · MMXXVI</span>
      <span>File №01</span>
    </div>

    <div class="head">
      <div class="eye">Manifesto · Pars I</div>
      <h1>
        Lorem<br>
        <span class="it">ipsum</span><br>
        dolor.
        <span class="sm">— consectetur adipiscing elit.</span>
      </h1>
    </div>

    <div class="seal" aria-hidden>
      <div class="crest">
        <svg viewBox="0 0 200 200" fill="none">
          <path d="M40 150 L160 150 L160 140 L40 140 Z" fill="#0a1326" opacity=".9"/>
          <path d="M50 140 L50 90 M70 140 L70 90 M90 140 L90 90 M110 140 L110 90 M130 140 L130 90 M150 140 L150 90"
            stroke="#0a1326" stroke-width="3" opacity=".9"/>
          <path d="M40 90 L160 90 L160 80 L40 80 Z" fill="#0a1326" opacity=".9"/>
          <path d="M100 80 Q60 80 60 50 Q60 30 100 30 Q140 30 140 50 Q140 80 100 80 Z" fill="#0a1326" opacity=".9"/>
          <circle cx="100" cy="25" r="4" fill="#0a1326" opacity=".9"/>
          <path d="M100 22 L100 8" stroke="#0a1326" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <div class="bot">
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, <span>sed do eiusmod tempor.</span></p>
      <div class="src">Lorem Ipsum · Districtus XIV</div>
    </div>

    <div class="foot">
      <span>Lorem · Ipsum · Dolor</span>
      <span>MMXXVI</span>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 05 — Statistic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd; --bone-deep:#d8cdb1;
    --ink:#0a1326; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;
    background:linear-gradient(180deg, #f3ede0 0%, #ebe2cd 70%, #d8cdb1 100%);
    color:var(--ink);font-family:var(--sans);
    box-shadow:0 60px 120px -40px rgba(0,0,0,.45);
  }
  .stage::before{
    content:"";position:absolute;inset:0;z-index:60;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode:multiply;opacity:.55;
  }
  /* Soft top glow */
  .glow{
    position:absolute;left:50%;top:-300px;transform:translateX(-50%);
    width:1200px;height:800px;border-radius:50%;
    background:radial-gradient(50% 50% at 50% 50%, rgba(255,232,180,.7) 0%, transparent 70%);
    z-index:2;
  }
  .frame{position:absolute;inset:56px;border:1px solid rgba(10,19,38,.18);z-index:8;pointer-events:none}

  .meta{
    position:absolute;left:96px;right:96px;top:96px;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);z-index:20;
  }

  .label{
    position:absolute;left:96px;top:200px;z-index:14;
    font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);
    display:flex;align-items:center;gap:14px;
  }
  .label::before{content:"";width:46px;height:1px;background:var(--ink)}

  /* Massive number with 3D extrusion */
  .num{
    position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
    font-family:var(--display);font-weight:500;
    font-size:680px;line-height:.78;letter-spacing:-.07em;
    color:var(--ink);
    text-shadow:
      0 2px 0 rgba(10,19,38,.95),
      0 4px 0 rgba(10,19,38,.9),
      0 6px 0 rgba(10,19,38,.8),
      0 8px 0 rgba(122,36,34,.85),
      0 10px 0 rgba(122,36,34,.7),
      0 12px 0 rgba(122,36,34,.55),
      0 14px 0 rgba(155,45,44,.45),
      0 18px 30px rgba(10,19,38,.5),
      0 40px 80px rgba(10,19,38,.35);
    z-index:14;
  }
  .num .plus{
    font-family:var(--display);font-style:italic;font-weight:400;font-size:.42em;color:var(--signal-deep);
    vertical-align:.55em;letter-spacing:-.03em;
  }
  /* gold ribbon */
  .ribbon{
    position:absolute;left:120px;top:60%;transform:rotate(-8deg);z-index:18;
    background:linear-gradient(90deg,var(--ochre-soft) 0%, var(--ochre) 50%, #6f5024 100%);
    color:var(--ink);
    padding:14px 28px 14px 36px;
    font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;font-weight:600;
    clip-path:polygon(0 0, 100% 0, 96% 50%, 100% 100%, 0 100%, 4% 50%);
    box-shadow:0 24px 40px rgba(10,19,38,.35), inset 0 2px 0 rgba(255,235,200,.6);
  }

  /* Caption block */
  .caption{
    position:absolute;left:96px;right:96px;bottom:170px;z-index:18;display:flex;justify-content:space-between;align-items:end;gap:40px;
  }
  .caption h2{
    font-family:var(--display);font-weight:500;font-size:54px;line-height:1.02;letter-spacing:-.02em;max-width:520px;
  }
  .caption h2 .it{font-style:italic;color:var(--signal-deep);font-weight:400}
  .caption .body{
    font-family:var(--sans);font-size:15px;line-height:1.6;color:var(--ink-mute);max-width:340px;
  }

  /* Footer */
  .foot{
    position:absolute;left:96px;right:96px;bottom:96px;display:flex;justify-content:space-between;z-index:18;
    font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);
  }
  .foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--signal);margin-right:10px;vertical-align:1px}

  /* Decorative axis lines under number */
  .axis{
    position:absolute;left:96px;right:96px;top:46%;height:1px;background:var(--ink);opacity:.2;z-index:12;
  }
  .axis::before{content:"";position:absolute;left:0;top:-3px;width:7px;height:7px;background:var(--ink);transform:rotate(45deg)}
  .axis::after{content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;background:var(--ink);transform:rotate(45deg)}
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="frame"></div>

    <div class="meta">
      <span>Mensura · Datum I</span>
      <span>File №05 / Lorem</span>
    </div>

    <div class="label">Numerus — Lorem ipsum dolor</div>

    <div class="axis"></div>
    <div class="num">12<span class="plus">k+</span></div>

    <div class="ribbon">Lorem Ipsum · Dolor</div>

    <div class="caption">
      <h2>Lorem ipsum<br><span class="it">dolor sit amet.</span></h2>
      <p class="body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore.</p>
    </div>

    <div class="foot">
      <span><span class="dot"></span>Lorem · Ipsum · Dolor</span>
      <span>V / X · Districtus XIV</span>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 07 — Asymmetric Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#f3ede0; --bone-soft:#ebe2cd;
    --ink:#0a1326; --ink-mute:#4b5364;
    --signal:#9b2d2c; --signal-deep:#7a2422;
    --ochre:#b58a4a; --ochre-soft:#d4ac6e;
    --display:'Fraunces',serif; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:grid;place-items:center;min-height:100vh;padding:24px}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;
    background:var(--bone);color:var(--ink);font-family:var(--sans);
    box-shadow:0 60px 120px -40px rgba(0,0,0,.45);
  }
  .stage::after{
    content:"";position:absolute;inset:0;z-index:60;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 .05 0 0 0 0 .1 0 0 0 0 .18 0 0 0 .1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode:multiply;opacity:.55;
  }

  /* Diagonal ink panel */
  .panel{
    position:absolute;top:0;right:0;width:62%;height:100%;z-index:4;
    background:linear-gradient(135deg, #18223b 0%, #0a1326 60%, #050912 100%);
    clip-path:polygon(18% 0, 100% 0, 100% 100%, 0 100%);
    box-shadow:-30px 0 80px rgba(10,19,38,.4);
  }
  .panel::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(40% 40% at 60% 30%, rgba(212,172,110,.18), transparent 70%);
  }
  /* dotted highlight */
  .panel::after{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(243,237,224,.16) 1px, transparent 1px);
    background-size:18px 18px;
    mask-image:linear-gradient(180deg, transparent 0%, #000 30%, #000 70%, transparent 100%);
    opacity:.5;
  }

  /* Floating crimson cube via gradients */
  .cube{
    position:absolute;right:14%;top:34%;width:340px;height:340px;z-index:14;
    transform:rotate(-12deg);
    filter:drop-shadow(0 50px 60px rgba(10,19,38,.5)) drop-shadow(0 20px 40px rgba(155,45,44,.3));
  }
  .cube .face{position:absolute;}
  .cube .top{
    width:300px;height:170px;left:20px;top:0;
    background:linear-gradient(135deg, #d9aa6e 0%, var(--ochre) 50%, #6f5024 100%);
    transform:skew(-30deg, 0deg);transform-origin:right top;
    box-shadow:inset 0 0 30px rgba(255,232,180,.5);
  }
  .cube .front{
    width:260px;height:260px;left:0;top:80px;
    background:linear-gradient(140deg, var(--signal) 0%, var(--signal-deep) 60%, #4d1716 100%);
    box-shadow:inset 30px 30px 60px rgba(255,180,140,.25), inset -30px -30px 60px rgba(0,0,0,.4);
  }
  .cube .side{
    width:130px;height:240px;left:260px;top:80px;
    background:linear-gradient(180deg, #6f201f 0%, #3e0f0e 100%);
    transform:skewY(30deg);transform-origin:left top;
    box-shadow:inset 0 0 40px rgba(0,0,0,.4);
  }

  /* Big serif on left bone */
  .left{
    position:absolute;left:96px;right:55%;top:200px;bottom:96px;z-index:18;display:flex;flex-direction:column;justify-content:space-between;
  }
  .meta{
    font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);
    display:flex;align-items:center;gap:14px;
  }
  .meta::before{content:"";width:46px;height:1px;background:var(--ink)}
  h1{
    font-family:var(--display);font-weight:500;font-size:130px;line-height:.9;letter-spacing:-.035em;color:var(--ink);
    margin-top:30px;
  }
  h1 .it{font-style:italic;font-weight:400;color:var(--signal-deep)}
  .l-foot{
    font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute);
    line-height:1.9;
  }
  .l-foot b{color:var(--ink);font-weight:600}

  /* Right side caption on ink */
  .right{
    position:absolute;right:96px;top:130px;width:340px;z-index:24;
    color:rgba(243,237,224,.85);font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;
    text-align:right;
  }
  .right .big{
    display:block;font-family:var(--display);font-style:italic;font-weight:400;font-size:80px;color:#f3ede0;
    letter-spacing:-.025em;margin-top:8px;
  }

  .right-body{
    position:absolute;right:96px;bottom:160px;max-width:320px;z-index:24;
    color:rgba(243,237,224,.78);font-size:15px;line-height:1.6;text-align:right;font-family:var(--sans);
  }
  .right-body b{color:#f3ede0;font-weight:600}

  .stamp{
    position:absolute;right:96px;bottom:96px;z-index:30;
    border:1px solid rgba(243,237,224,.5);padding:12px 18px;
    font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#f3ede0;
    background:rgba(155,45,44,.18);backdrop-filter:blur(6px);
    transform:rotate(-3deg);
  }

  /* Top hairlines */
  .h-line{position:absolute;left:96px;right:96px;top:96px;height:1px;background:rgba(10,19,38,.18);z-index:8}
  .h-line::before,.h-line::after{content:"";position:absolute;top:-3px;width:7px;height:7px;background:var(--ink);transform:rotate(45deg)}
  .h-line::before{left:0}.h-line::after{right:0;background:var(--bone)}
</style>
</head>
<body>
  <div class="stage">
    <div class="panel"></div>

    <div class="h-line"></div>

    <div class="cube" aria-hidden>
      <div class="face top"></div>
      <div class="face front"></div>
      <div class="face side"></div>
    </div>

    <div class="left">
      <div>
        <div class="meta">Capitulum VII · Lorem</div>
        <h1>Lorem<br><span class="it">ipsum</span><br>dolor.</h1>
      </div>
      <div class="l-foot">
        <b>Lorem · Ipsum · Dolor</b><br>
        Sit amet · Consectetur · MMXXVI<br>
        Pars VII / X
      </div>
    </div>

    <div class="right">
      Vox · Pars II<br>
      <span class="big">Pars<br>secunda.</span>
    </div>

    <p class="right-body">
      <b>Lorem ipsum dolor sit amet,</b> consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
    </p>

    <div class="stamp">Lorem · Ipsum · Dolor</div>
  </div>
</body>
</html>
